name: Validate Frontmatter

on:
  push:
    paths:
      - "prompts/**/*.md"
      - "agents/**/*.md"
      - "skills/**/SKILL.md"
      - "tools/**/*.md"
  pull_request:
    paths:
      - "prompts/**/*.md"
      - "agents/**/*.md"
      - "skills/**/SKILL.md"
      - "tools/**/*.md"

jobs:
  validate:
    name: Check required YAML frontmatter fields
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate frontmatter on prompts, agents, and skills
        run: |
          python - <<'EOF'
          import os
          import sys
          import yaml

          # Required fields per file type
          RULES = {
              "prompt":  ["id", "version", "status", "description", "author"],
              "agent":   ["id", "version", "status", "description", "author"],
              "skill":   ["id", "version", "status", "description", "author"],
          }

          def classify(filepath):
              """Determine which rule set applies to a file."""
              parts = filepath.replace("\\", "/").split("/")
              filename = os.path.basename(filepath)
              if "prompts" in parts:
                  return "prompt"
              if "agents" in parts and filename == "agent.md":
                  return "agent"
              if "skills" in parts and filename == "SKILL.md":
                  return "skill"
              return None

          def extract_frontmatter(filepath):
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              if not content.startswith("---"):
                  return None
              parts = content.split("---", 2)
              if len(parts) < 3:
                  return None
              try:
                  return yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  return {"__parse_error__": str(e)}

          SEARCH_DIRS = ["prompts", "agents", "skills"]
          errors = []
          checked = 0

          for search_dir in SEARCH_DIRS:
              for root, _, files in os.walk(search_dir):
                  for filename in files:
                      if not filename.endswith(".md"):
                          continue
                      filepath = os.path.join(root, filename)
                      rule_key = classify(filepath)
                      if rule_key is None:
                          continue  # Skip READMEs and _index files

                      checked += 1
                      frontmatter = extract_frontmatter(filepath)

                      if frontmatter is None:
                          errors.append(f"MISSING FRONTMATTER: {filepath}")
                          continue

                      if "__parse_error__" in frontmatter:
                          errors.append(f"INVALID YAML in {filepath}: {frontmatter['__parse_error__']}")
                          continue

                      for field in RULES[rule_key]:
                          if field not in frontmatter or frontmatter[field] is None:
                              errors.append(f"MISSING FIELD '{field}': {filepath}")

          print(f"\nChecked {checked} file(s).")

          if errors:
              print("\n❌ Frontmatter validation failed:\n")
              for err in errors:
                  print(f"  • {err}")
              print(f"\n{len(errors)} error(s) found. Fix the issues above and push again.")
              sys.exit(1)
          else:
              print("✅ All prompt, agent, and skill files have valid frontmatter.")
          EOF
