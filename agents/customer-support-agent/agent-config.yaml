# agent-config.yaml — Customer Support Agent
#
# This file defines the runtime configuration for the customer-support-agent.
# Copy and fill in all <PLACEHOLDER> values before deploying.

agent:
  id: customer-support-agent
  version: "1.0"
  description: Handles customer queries including refunds, order status, and FAQs.
  status: production          # production | staging | experimental

# ---------------------------------------------------------------------------
# Model settings
# ---------------------------------------------------------------------------
model:
  provider: openai              # openai | anthropic | ollama | custom
  name: gpt-4o
  temperature: 0.3              # Lower = more deterministic; keep low for support tasks
  max_tokens: 1024
  # For Ollama (local), replace above with:
  # provider: ollama
  # name: llama3
  # base_url: http://localhost:11434

# ---------------------------------------------------------------------------
# System prompt
# ---------------------------------------------------------------------------
system_prompt:
  file: system-prompt.md        # Path relative to this config file
  variables:
    company_name: "<PLACEHOLDER: e.g., Acme Corp>"
    refund_policy: "<PLACEHOLDER: paste or reference your refund policy>"
    escalation_threshold: "<PLACEHOLDER: e.g., $500>"

# ---------------------------------------------------------------------------
# Skills / tools the agent can call
# ---------------------------------------------------------------------------
skills:
  - name: order-lookup
    ref: skills/order-lookup.yaml
  - name: knowledge-base-search
    ref: skills/knowledge-base-search.yaml
  - name: web-search
    ref: skills/web-search.yaml

# ---------------------------------------------------------------------------
# Memory configuration
# ---------------------------------------------------------------------------
memory:
  type: buffer                  # buffer | summary | vector
  max_messages: 20              # Number of messages to retain in context

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  max_turns: 15                 # End conversation after this many turns
  escalation_keywords:          # Trigger human handoff on these keywords
    - speak to a human
    - manager
    - escalate
  content_filter: true          # Enable provider-side content filtering

# ---------------------------------------------------------------------------
# Logging & tracing
# ---------------------------------------------------------------------------
logging:
  level: info                   # debug | info | warn | error
  trace: true                   # Emit LangSmith / custom traces
