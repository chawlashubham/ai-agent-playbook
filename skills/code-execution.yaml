# skill: code-execution
# Version: 1.0
# Description: Executes sandboxed code snippets and returns stdout/stderr.
#
# WARNING: Always run in an isolated sandbox. Never allow filesystem or
# network access from untrusted code.

skill:
  name: code-execution
  version: "1.0"
  description: >
    Executes a code snippet in a sandboxed environment and returns
    the standard output and error. Supports Python and JavaScript.
  tags:
    - code
    - execution
    - sandbox
    - python
    - javascript
  status: production

  input_schema:
    code:
      type: string
      required: true
      description: The code to execute.
    language:
      type: string
      required: true
      enum: [python, javascript]
      description: The programming language of the snippet.
    timeout_seconds:
      type: integer
      required: false
      default: 10
      description: Maximum execution time in seconds.

  output_schema:
    stdout:
      type: string
      description: Standard output from the execution.
    stderr:
      type: string
      description: Standard error output (if any).
    exit_code:
      type: integer
      description: Process exit code (0 = success).

  implementation:
    type: api
    endpoint: https://sandbox.example.com/v1/execute
    method: POST
    auth:
      type: bearer_token
      env_var: SANDBOX_API_TOKEN
    body:
      language: "{{language}}"
      code: "{{code}}"
      timeout: "{{timeout_seconds}}"

  on_error:
    strategy: raise
