# skill: file-reader
# Version: 1.0
# Description: Reads and parses local or remote files (PDF, TXT, Markdown, HTML).

skill:
  name: file-reader
  version: "1.0"
  description: >
    Reads and extracts text content from a local file path or a remote URL.
    Supports PDF, plain text, Markdown, and HTML formats.
  tags:
    - file
    - document
    - parsing
    - pdf
    - text-extraction
  status: production

  input_schema:
    source:
      type: string
      required: true
      description: >
        Local file path (e.g., /data/report.pdf) or remote URL
        (e.g., https://example.com/paper.pdf).
    max_chars:
      type: integer
      required: false
      default: 10000
      description: Maximum number of characters to return (to manage context length).

  output_schema:
    content:
      type: string
      description: Extracted text content of the file.
    source_type:
      type: string
      description: Detected type of the source (pdf | txt | markdown | html | unknown).
    truncated:
      type: boolean
      description: True if the content was truncated to max_chars.

  implementation:
    type: python_function
    module: skills.file_reader
    function: read_file
    args:
      source: "{{source}}"
      max_chars: "{{max_chars}}"

  on_error:
    strategy: raise
