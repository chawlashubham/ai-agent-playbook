# skill: web-search
# Version: 1.0
# Description: Queries a search engine and returns ranked results.
#
# Referenced by: agents/research-agent, agents/customer-support-agent

skill:
  name: web-search
  version: "1.0"
  description: >
    Search the web for up-to-date information on a given query.
    Returns a ranked list of results with titles, URLs, and snippets.
  tags:
    - search
    - web
    - information-retrieval
  status: production

  # -------------------------------------------------------------------------
  # Input schema — parameters the agent passes when calling this skill
  # -------------------------------------------------------------------------
  input_schema:
    query:
      type: string
      required: true
      description: The search query string.
    num_results:
      type: integer
      required: false
      default: 5
      description: Number of results to return (max 20).

  # -------------------------------------------------------------------------
  # Output schema — what the skill returns to the agent
  # -------------------------------------------------------------------------
  output_schema:
    results:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          url:
            type: string
          snippet:
            type: string

  # -------------------------------------------------------------------------
  # Implementation
  # -------------------------------------------------------------------------
  implementation:
    type: api                   # api | python_function | shell | langchain_tool
    endpoint: https://api.search.example.com/v1/search
    method: GET
    auth:
      type: api_key
      header: X-API-Key
      env_var: SEARCH_API_KEY   # Set this environment variable; never hardcode
    params:
      q: "{{query}}"
      count: "{{num_results}}"

  # -------------------------------------------------------------------------
  # Error handling
  # -------------------------------------------------------------------------
  on_error:
    strategy: return_empty      # return_empty | retry | raise
    retry_attempts: 2
