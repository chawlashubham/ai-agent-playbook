# config.yaml — Agent Runtime Configuration
#
# INSTRUCTIONS: Copy this file to agents/<agent-name>/config.yaml
# Fill in all <PLACEHOLDER> values. Do not add prose — keep this pure config.

id: <agent-name>
version: "1.0"
status: experimental           # experimental | staging | production

# ---------------------------------------------------------------------------
# Model settings
# ---------------------------------------------------------------------------
model:
  provider: openai             # openai | anthropic | ollama | custom
  name: gpt-4o
  temperature: 0.7             # 0.0–1.0; lower = more deterministic
  max_tokens: 1024
  # For Anthropic:
  # provider: anthropic
  # name: claude-sonnet-4-6
  # For local Ollama:
  # provider: ollama
  # name: llama3
  # base_url: http://localhost:11434

# ---------------------------------------------------------------------------
# System prompt
# ---------------------------------------------------------------------------
system_prompt: system-prompt.md
prompt_variables:
  variable_1: "<PLACEHOLDER>"   # Must match {{variable_1}} in system-prompt.md
  variable_2: "<PLACEHOLDER>"

# ---------------------------------------------------------------------------
# Skills
# ---------------------------------------------------------------------------
skills:
  - ref: skills/<skill-name>/SKILL.md

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
memory:
  type: buffer                 # buffer | summary | vector
  max_messages: 20

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  max_turns: 20
  content_filter: true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: info                  # debug | info | warn | error
  trace: false
