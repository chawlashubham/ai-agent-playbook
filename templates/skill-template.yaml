# skill-template.yaml
#
# INSTRUCTIONS: Copy this file, rename it to <domain>-<action>.yaml,
# and fill in all <PLACEHOLDER> values.
# Save as: skills/<domain>-<action>.yaml

skill:
  name: <skill-name>                      # e.g., web-search
  version: "1.0"
  description: >
    <One to two sentence description of what this skill does.>
  tags:
    - <tag-1>
    - <tag-2>
  status: experimental                    # experimental | production | deprecated

  # -------------------------------------------------------------------------
  # Input schema
  # -------------------------------------------------------------------------
  input_schema:
    <param_name>:
      type: string                        # string | integer | boolean | array | object
      required: true
      description: <Description of this parameter.>
    <optional_param>:
      type: integer
      required: false
      default: <default_value>
      description: <Description.>

  # -------------------------------------------------------------------------
  # Output schema
  # -------------------------------------------------------------------------
  output_schema:
    <output_field>:
      type: string
      description: <Description of the output field.>

  # -------------------------------------------------------------------------
  # Implementation
  # Choose ONE of: api | python_function | shell | langchain_tool
  # -------------------------------------------------------------------------
  implementation:
    type: api                             # Change to match your implementation
    endpoint: <https://api.example.com/v1/endpoint>
    method: GET                           # GET | POST | PUT
    auth:
      type: api_key                       # api_key | bearer_token | none
      header: X-API-Key                  # Header name for api_key auth
      env_var: <ENV_VAR_NAME>             # Environment variable holding the secret

    # For python_function:
    # type: python_function
    # module: skills.<module_name>
    # function: <function_name>

  # -------------------------------------------------------------------------
  # Error handling
  # -------------------------------------------------------------------------
  on_error:
    strategy: raise                       # return_empty | retry | raise
    retry_attempts: 2                     # Only used if strategy: retry
